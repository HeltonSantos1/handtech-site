<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020a16;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#040f22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7fd6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a7bff;stop-opacity:1"/>
    </linearGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="18" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="none"
        stroke="#0a7bff" stroke-width="6" opacity="0.5"/>
  <rect width="512" height="512" rx="110" ry="110" fill="none"
        stroke="#4fc3ff" stroke-width="2" opacity="0.3"/>

  <line x1="130" y1="60" x2="382" y2="60"
        stroke="#4fc3ff" stroke-width="2" opacity="0.4"/>

  <text x="256" y="330"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="248" font-weight="700"
        text-anchor="middle"
        fill="#0a7bff" filter="url(#neon)" opacity="0.6">AH</text>

  <text x="256" y="330"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="248" font-weight="700"
        text-anchor="middle"
        fill="url(#letterGrad)" filter="url(#glow)">AH</text>

  <line x1="130" y1="390" x2="382" y2="390"
        stroke="#4fc3ff" stroke-width="2" opacity="0.4"/>
</svg>
